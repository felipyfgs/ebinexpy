name: Publish to PyPI

on:
  release:
    types: [published]

concurrency:
  group: pypi-${{ github.event.release.tag_name }}
  cancel-in-progress: false

jobs:
  build:
    name: Build and verify distributions
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install development dependencies
        run: python -m pip install -e '.[dev]'

      - name: Verify release tag matches package version
        env:
          RELEASE_TAG: ${{ github.event.release.tag_name }}
        run: |
          python - <<'PY'
          import os
          import tomllib
          from pathlib import Path

          version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          tag = os.environ["RELEASE_TAG"].removeprefix("v")
          if tag != version:
              raise SystemExit(
                  f"Release tag {os.environ['RELEASE_TAG']!r} does not match version {version!r}"
              )
          PY

      - name: Run lint
        run: ruff check .

      - name: Run tests
        run: pytest

      - name: Build wheel and source distribution
        run: python -m build

      - name: Verify wheel installation
        run: |
          python -m pip install --force-reinstall dist/*.whl
          python -c 'import ebinexpy; print(ebinexpy.__version__)'

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish distributions to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ebinexpy
    permissions:
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
